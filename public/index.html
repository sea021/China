<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chinese Listening Challenge</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #6366f1;
            --success-color: #10b981;
            --error-color: #ef4444;
            --bg-color: #f8fafc;
            --card-bg: rgba(255, 255, 255, 0.85); 
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Poppins', 'Kanit', sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
            background-color: #000; 
        }

        /* 🎬 วิดีโอพื้นหลัง v.mp4 เต็มหน้าจอ */
        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
            filter: brightness(60%);
        }

        .quiz-container {
            background: var(--card-bg);
            padding: 35px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 520px;
            text-align: center;
            position: relative;
            transition: all 0.3s ease;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        /* Progress Bar */
        .progress-wrapper {
            margin-bottom: 25px;
        }
        .progress-bar-bg {
            background: rgba(226, 232, 240, 0.6);
            height: 8px;
            border-radius: 999px;
            overflow: hidden;
        }
        .progress-bar-fill {
            background: linear-gradient(90deg, #6366f1, #818cf8);
            height: 100%;
            width: 5%;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ป้ายระดับความยาก */
        .level-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 16px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 20px;
            letter-spacing: 0.5px;
        }
        .level-easy { background: #ecfdf5; color: #059669; }
        .level-medium { background: #fff7ed; color: #d97706; }
        .level-hard { background: #fef2f2; color: #dc2626; }

        h2 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 15px;
            margin-bottom: 30px;
        }

        /* ปุ่มฟังเสียง */
        .btn-audio {
            background: linear-gradient(135deg, #4f46e5 0%, #6366f1 100%);
            color: white;
            border: none;
            width: 84px;
            height: 84px;
            border-radius: 50%;
            font-size: 28px;
            cursor: pointer;
            margin-bottom: 35px;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.3);
            transition: all 0.2s ease;
        }
        .btn-audio:hover {
            transform: scale(1.08);
            box-shadow: 0 12px 24px rgba(79, 70, 229, 0.4);
        }
        .btn-audio:active { transform: scale(0.95); }

        /* ปุ่มตัวเลือก */
        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .btn-option {
            background: #ffffff;
            border: 2px solid #e2e8f0;
            padding: 18px 24px;
            font-size: 16px;
            font-family: inherit;
            font-weight: 500;
            color: var(--text-main);
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .btn-option:hover:not(:disabled) {
            background: #f8fafc;
            border-color: var(--primary-color);
            transform: translateY(-2px);
        }
        .btn-option:disabled {
            cursor: not-allowed;
            opacity: 0.8;
        }

        /* สถานะปุ่มหลังกดยืนยันคำตอบ */
        .btn-correct {
            background: #ecfdf5 !important;
            border-color: var(--success-color) !important;
            color: #047857 !important;
        }
        .btn-wrong {
            background: #fef2f2 !important;
            border-color: var(--error-color) !important;
            color: #b91c1c !important;
        }

        /* ข้อความแจ้งผล */
        #result {
            margin-top: 25px;
            min-height: 32px;
            font-size: 18px;
            font-weight: 600;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        /* ปุ่มถัดไป */
        .next-btn {
            margin-top: 25px;
            background: #1e293b;
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 14px;
            cursor: pointer;
            width: 100%;
            display: none;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(30, 41, 59, 0.2);
        }
        .next-btn:hover { background: #0f172a; transform: translateY(-1px); }

        .summary-card i {
            font-size: 64px;
            color: #eab308;
            margin-bottom: 20px;
        }
        .score-big {
            font-size: 48px;
            font-weight: 700;
            color: var(--primary-color);
            margin: 15px 0;
        }
    </style>
</head>
<body>

<video autoplay loop muted playsinline class="video-background">
    <source src="v.mp4" type="video/mp4">
</video>

<div class="quiz-container">
    <div class="progress-wrapper">
        <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="progress-fill"></div>
        </div>
    </div>

    <div id="level-tag" class="level-badge level-easy">
        <i class="fa-solid fa-graduation-cap"></i> LEVEL 1: เริ่มต้นเบบี๋
    </div>
    
    <h2>ข้อที่ <span id="question-number">1</span> / 20</h2>
    <p class="subtitle">ฟังสำเนียงแล้วเลือกความหมายที่ถูกต้องที่สุด</p>
    
    <button class="btn-audio" onclick="playAudio()" title="ฟังเสียง">
        <i class="fa-solid fa-volume-high"></i>
    </button>
    <audio id="quiz-audio"></audio>

    <div class="options-grid" id="options-container"></div>

    <div id="result"></div>
    <button class="next-btn" id="next-button" onclick="nextQuestion()">
        ถัดไป <i class="fa-solid fa-arrow-right" style="margin-left: 6px;"></i>
    </button>
</div>

<script>
    let quizzes = [];
    let currentIdx = 0;
    let totalScore = 0;

    window.onload = loadQuizData;

    async function loadQuizData() {
        try {
            const response = await fetch('/api/quiz');
            quizzes = await response.json();
            if (quizzes && quizzes.length > 0) {
                showQuestion();
            } else {
                document.querySelector('.quiz-container').innerHTML = '<h2>เกิดข้อผิดพลาดในการโหลดข้อมูลคำถาม</h2>';
            }
        } catch (error) {
            console.error("Error โหลดข้อมูลควิซ:", error);
            document.querySelector('.quiz-container').innerHTML = '<h2>ไม่สามารถติดต่อเซิร์ฟเวอร์เพื่อโหลดข้อสอบได้</h2>';
        }
    }

    function showQuestion() {
        if (currentIdx >= quizzes.length) {
            renderSummary();
            return;
        }

        const currentQuiz = quizzes[currentIdx];
        
        const progressPercent = ((currentIdx + 1) / quizzes.length) * 100;
        document.getElementById('progress-fill').style.width = `${progressPercent}%`;

        const levelTag = document.getElementById('level-tag');
        if (currentIdx < 7) {
            levelTag.innerHTML = `<i class="fa-solid fa-seedling"></i> LEVEL 1: เริ่มต้นเบบี๋`;
            levelTag.className = "level-badge level-easy";
        } else if (currentIdx < 14) {
            levelTag.innerHTML = `<i class="fa-solid fa-fire"></i> LEVEL 2: เริ่มจริงจัง`;
            levelTag.className = "level-badge level-medium";
        } else {
            levelTag.innerHTML = `<i class="fa-solid fa-dragon"></i> LEVEL 3: ระดับปราบเซียน`;
            levelTag.className = "level-badge level-hard";
        }

        document.getElementById('question-number').innerText = currentIdx + 1;
        document.getElementById('quiz-audio').src = currentQuiz.audio;
        document.getElementById('result').innerHTML = '';
        document.getElementById('next-button').style.display = 'none';

        const optionsContainer = document.getElementById('options-container');
        optionsContainer.innerHTML = '';
        
        currentQuiz.options.forEach((option, index) => {
            const button = document.createElement('button');
            button.className = 'btn-option';
            button.id = `option-${index}`; // ผูกไอดีเอาไว้ทำสีปุ่มเฉลยกรณีตอบผิด
            button.innerHTML = `<span style="color:var(--text-muted); font-weight:600; margin-right:4px;">${index + 1}.</span> ${option}`;
            
            // 🛠️ ปรับให้ส่งค่า index ไปแทนการส่งข้อความตัวหนังสือ เพื่อให้สอดรับกับความต้องการดั้งเดิมของระบบ
            button.onclick = () => sendAnswerToBackend(currentQuiz.id, index, button);
            optionsContainer.appendChild(button);
        });

        setTimeout(() => { playAudio(); }, 300);
    }

    function playAudio() {
        const audio = document.getElementById('quiz-audio');
        if (audio.src) {
             audio.play().catch(err => console.log("รอผู้ใช้มีส่วนร่วมหน้าจอก่อนเริ่มเปิดเสียง"));
        }
    }

    async function sendAnswerToBackend(questionId, selectedIndex, clickedButton) {
        const buttons = document.querySelectorAll('.btn-option');
        buttons.forEach(btn => btn.disabled = true);

        try {
            const response = await fetch('/api/check-answer', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ questionId, selectedIndex })
            });
            const data = await response.json();
            
            const resultDiv = document.getElementById('result');
            
            // ตรวจสอบตามชื่อคีย์ 'correct' ที่ตอบกลับมาจากเซิร์ฟเวอร์ของคุณ
            if (data && data.correct) {
                clickedButton.classList.add('btn-correct'); 
                resultDiv.innerHTML = `<span style="color: var(--success-color);"><i class="fa-solid fa-circle-check"></i> ถูกต้องยอดเยี่ยม!</span>`;
                totalScore++;
            } else {
                clickedButton.classList.add('btn-wrong'); 
                
                // เฉลยข้อที่ถูกต้องด้วยปุ่มสีเขียว โดยอิงตามชื่อตัวแปร correctAnswerIndex ของคุณ
                if (data && data.correctAnswerIndex !== undefined && data.correctAnswerIndex !== null) {
                    const correctButton = document.getElementById(`option-${data.correctAnswerIndex}`);
                    if (correctButton) {
                        correctButton.classList.add('btn-correct');
                    }
                }
                resultDiv.innerHTML = `<span style="color: var(--error-color);"><i class="fa-solid fa-circle-xmark"></i> ยังไม่ถูกนะน้า..</span>`;
            }
            
            document.getElementById('next-button').style.display = 'block';
        } catch (error) {
            console.error("เกิดปัญหาระหว่างส่งตรวจคำตอบ:", error);
            buttons.forEach(btn => btn.disabled = false);
            document.getElementById('result').innerHTML = `<span style="color: var(--error-color);">ระบบตรวจคำตอบขัดข้อง</span>`;
        }
    }

    function nextQuestion() {
        currentIdx++;
        showQuestion();
    }

    function renderSummary() {
        const container = document.querySelector('.quiz-container');
        container.innerHTML = `
            <div class="summary-card">
                <i class="fa-solid fa-trophy"></i>
                <h2>จบการท้าทายแล้ว!</h2>
                <p class="subtitle">มาดูคะแนนความสามารถในการฟังภาษาจีนของคุณกัน</p>
                <div class="score-big">${totalScore} / ${quizzes.length}</div>
                <p>เก่งมากที่ทำจนจบ! พัฒนาต่อไปเรื่อยๆ นะครับ</p>
                <button class="next-btn" style="display:block; margin-top:30px;" onclick="location.reload()">
                    <i class="fa-solid fa-rotate-right"></i> เล่นอีกรอบ
                </button>
            </div>
        `;
    }
</script>
</body>
</html>
